name: Build x86 Mod

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 6.0.x

    - name: Build
      # Added the architecture flag here
      run: dotnet build --configuration Release -r win-x86 --self-contained false

    - name: Save Mod
      uses: actions/upload-artifact@v4
      with:
        name: LeftyMode-x86
        path: bin/Release/net6.0/win-x86/
        
